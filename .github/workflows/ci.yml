name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip install -e . --no-deps

      - name: Check syntax
        run: python -m compileall src

      - name: Run tests
        run: python -m pytest

      - name: Run linter
        run: python -m ruff check src tests

  docker:
    name: Docker reproducibility check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cliprob/nba-predict:ci .

      - name: Run deterministic reproduction in Docker
        run: docker run --rm cliprob/nba-predict:ci make reproduce

      - name: Render report in Docker
        run: docker run --rm cliprob/nba-predict:ci make report
